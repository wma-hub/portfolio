<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
var clickTag = "%%CLICK_URL_UNESC%%";
document.getElementById('ad-link').href = clickTag;

var HOLD = 2.7;
var tl = gsap.timeline({repeat:-1, defaults:{ease:'power2.out'}});

tl.set('#s2,#s3,#s4', {autoAlpha:0})
  .set('#s1', {autoAlpha:1})
  .set('#bg', {backgroundColor:'#142B6F'})
  .set('#s1-hl', {clipPath:'inset(100% 0 0 0)', opacity:1})
  .set('#s2-img-hyabest,#s2-img-ceratiq', {opacity:0})
  .set('#s2-logo,#s2-hl1,#s2-hl2,#s2-body', {opacity:0, y:8})
  .set('#s2-bar', {scaleX:0, transformOrigin:'left center'})
  .set('#s3-img-clear,#s3-img-orange', {opacity:0})
  .set('#s3-logo,#s3-hl,#s3-sub', {opacity:0, y:8})
  .set('#s4-logo,#s4-price,#s4-detail', {opacity:0, y:10})
  .set('#s4-cta', {opacity:0, scale:0.9})

// — F1: Hook —
  .to('#s1-hl', {clipPath:'inset(0% 0 0 0)', duration:0.6})
  .to({}, {duration:HOLD})

// — F1 → F2 —
  .addLabel('toF2')
  .to('#s1-hl', {opacity:0, y:-10, duration:0.35, ease:'power2.in'}, 'toF2')
  .to('#bg', {backgroundColor:'#F2F1F6', duration:0.3, ease:'power2.inOut'}, 'toF2')
  .set('#s2', {autoAlpha:1}, 'toF2+=0.28')

// — F2: Answer —
  .to('#s2-logo', {opacity:1, y:0, duration:0.4}, 'toF2+=0.3')
  .to('#s2-img-hyabest,#s2-img-ceratiq', {opacity:1, duration:0.7}, 'toF2+=0.38')
  .to('#s2-hl1', {opacity:1, y:0, duration:0.45}, 'toF2+=0.5')
  .to('#s2-hl2', {opacity:1, y:0, duration:0.4}, 'toF2+=0.65')
  .to('#s2-bar', {scaleX:1, duration:0.4}, 'toF2+=0.75')
  .to('#s2-body', {opacity:1, y:0, duration:0.4}, 'toF2+=0.88')
  .to({}, {duration:HOLD})

// — F2 → F3 —
  .addLabel('toF3')
  .to('#s2', {autoAlpha:0, duration:0.35, ease:'power2.in'}, 'toF3')
  .to('#bg', {backgroundColor:'#FAF5F7', duration:0.3, ease:'power2.inOut'}, 'toF3')
  .set('#s3', {autoAlpha:1}, 'toF3+=0.22')

// — F3: Product —
  .to('#s3-logo', {opacity:1, y:0, duration:0.4}, 'toF3+=0.28')
  .to('#s3-img-clear', {opacity:1, duration:0.8}, 'toF3+=0.3')
  .to('#s3-img-orange', {opacity:1, duration:0.6}, 'toF3+=0.45')
  .to('#s3-hl', {opacity:1, y:0, duration:0.5}, 'toF3+=0.62')
  .to('#s3-sub', {opacity:1, y:0, duration:0.4}, 'toF3+=0.78')
  .to({}, {duration:HOLD})

// — F3 → F4 —
  .addLabel('toF4')
  .to('#s3', {autoAlpha:0, duration:0.35, ease:'power2.in'}, 'toF4')
  .to('#bg', {backgroundColor:'#FAF5F7', duration:0.3, ease:'power2.inOut'}, 'toF4')
  .set('#s4', {autoAlpha:1}, 'toF4+=0.28')

// — F4: CTA —
  .to('#s4-logo', {opacity:1, y:0, duration:0.4}, 'toF4+=0.3')
  .to('#s4-price', {opacity:1, y:0, duration:0.5}, 'toF4+=0.45')
  .to('#s4-cta', {opacity:1, scale:1, duration:0.5}, 'toF4+=0.72')
  .to('#s4-detail', {opacity:1, y:0, duration:0.4}, 'toF4+=0.92')
  .to({}, {duration:HOLD});
</script>
