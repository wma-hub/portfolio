<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:728px;height:90px;overflow:hidden;font-family:'Plus Jakarta Sans',Arial,sans-serif;}
#ad{position:relative;width:728px;height:90px;overflow:hidden;border:1px solid #E0E0E0;}
#bg{position:absolute;inset:0;background:#142B6F;z-index:0;}

/* ── F1 ── */
#s1{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0 24px;z-index:2;}
#s1-hl{font-size:22px;font-weight:700;color:#FFFFFF;text-align:center;white-space:nowrap;}

/* ── F2 ── */
#s2{position:absolute;inset:0;overflow:hidden;z-index:2;}
/* Ceratiq: x=129, y=-19 → visible from top of ad, clips 19px at top */
#s2-logo{position:absolute;left:24px;top:33px;width:73px;height:24px;overflow:hidden;}
#s2-hl{position:absolute;left:413px;top:31px;width:291px;font-size:22px;font-weight:700;color:#142B6F;line-height:1.2;white-space:nowrap;}
#s2-bar{position:absolute;left:413px;top:62px;width:200px;height:3px;background:#F5D547;transform-origin:left center;}

/* ── F3 ── */
#s3{position:absolute;inset:0;overflow:hidden;z-index:2;}
#s3-logo{position:absolute;left:24px;top:33px;width:73px;height:24px;overflow:hidden;z-index:3;}
#s3-hl{position:absolute;left:445px;top:31px;width:259px;font-size:22px;font-weight:700;color:#142B6F;line-height:1.2;white-space:nowrap;z-index:3;}

/* ── F4 ── */
#s4{position:absolute;inset:0;z-index:2;}
#s4-logo{position:absolute;left:24px;top:50%;transform:translateY(-50%);width:73px;height:24px;overflow:hidden;}
#s4-content{position:absolute;left:115px;top:50%;transform:translateY(-50%);width:613px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
#s4-text{display:flex;align-items:center;width:379px;justify-content:space-between;}
#s4-price{font-size:16px;font-weight:600;color:#142B6F;white-space:nowrap;}
#s4-shipping{font-size:16px;font-weight:600;color:#142B6F;white-space:nowrap;}
#s4-cancel{font-size:16px;font-weight:600;color:#142B6F;white-space:nowrap;}
#s4-cta{flex-shrink:0;background:#F5D547;display:flex;align-items:center;justify-content:center;padding:8px 16px;}
#s4-cta-label{font-family:'Inter',Arial,sans-serif;font-size:13px;font-weight:700;color:#142B6F;white-space:nowrap;}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
var clickTag = "%%CLICK_URL_UNESC%%";
document.getElementById('ad-link').href = clickTag;

var HOLD = 2.7;
var tl = gsap.timeline({repeat:-1, defaults:{ease:'power2.out'}});

tl.set('#s2,#s3,#s4', {autoAlpha:0})
  .set('#s1', {autoAlpha:1})
  .set('#bg', {backgroundColor:'#142B6F'})
  .set('#s1-hl', {clipPath:'inset(100% 0 0 0)', opacity:1})
  .set('#s2-img-ceratiq,#s2-img-hyabest', {opacity:0})
  .set('#s2-logo,#s2-hl', {opacity:0, x:-12})
  .set('#s2-bar', {scaleX:0, transformOrigin:'left center'})
  .set('#s3-img-clear,#s3-img-orange', {opacity:0})
  .set('#s3-logo,#s3-hl', {opacity:0, x:-10})
  .set('#s4-logo', {opacity:0, x:-10})
  .set('#s4-price,#s4-shipping,#s4-cancel', {opacity:0, x:10})
  .set('#s4-cta', {opacity:0, scale:0.9})

// — F1: Hook —
  .to('#s1-hl', {clipPath:'inset(0% 0 0 0)', duration:0.6})
  .to({}, {duration:HOLD})

// — F1 → F2 —
  .addLabel('toF2')
  .to('#s1-hl', {opacity:0, y:-10, duration:0.35, ease:'power2.in'}, 'toF2')
  .to('#bg', {backgroundColor:'#F2F1F6', duration:0.3, ease:'power2.inOut'}, 'toF2')
  .set('#s2', {autoAlpha:1}, 'toF2+=0.28')

// — F2: Answer —
  .to('#s2-img-ceratiq,#s2-img-hyabest', {opacity:1, duration:0.6}, 'toF2+=0.3')
  .to('#s2-logo', {opacity:1, x:0, duration:0.4}, 'toF2+=0.35')
  .to('#s2-hl', {opacity:1, x:0, duration:0.45}, 'toF2+=0.48')
  .to('#s2-bar', {scaleX:1, duration:0.4}, 'toF2+=0.65')
  .to({}, {duration:HOLD})

// — F2 → F3 —
  .addLabel('toF3')
  .to('#s2', {autoAlpha:0, duration:0.35, ease:'power2.in'}, 'toF3')
  .to('#bg', {backgroundColor:'#FAF5F7', duration:0.3, ease:'power2.inOut'}, 'toF3')
  .set('#s3', {autoAlpha:1}, 'toF3+=0.22')

// — F3: Product —
  .to('#s3-img-clear', {opacity:1, duration:0.7}, 'toF3+=0.28')
  .to('#s3-img-orange', {opacity:1, duration:0.6}, 'toF3+=0.38')
  .to('#s3-logo', {opacity:1, x:0, duration:0.4}, 'toF3+=0.42')
  .to('#s3-hl', {opacity:1, x:0, duration:0.5}, 'toF3+=0.55')
  .to({}, {duration:HOLD})

// — F3 → F4 —
  .addLabel('toF4')
  .to('#s3', {autoAlpha:0, duration:0.35, ease:'power2.in'}, 'toF4')
  .to('#bg', {backgroundColor:'#FAF5F7', duration:0.3, ease:'power2.inOut'}, 'toF4')
  .set('#s4', {autoAlpha:1}, 'toF4+=0.28')

// — F4: CTA —
  .to('#s4-logo', {opacity:1, x:0, duration:0.4}, 'toF4+=0.32')
  .to('#s4-price', {opacity:1, x:0, duration:0.4}, 'toF4+=0.42')
  .to('#s4-shipping', {opacity:0.8, x:0, duration:0.4}, 'toF4+=0.52')
  .to('#s4-cancel', {opacity:0.6, x:0, duration:0.4}, 'toF4+=0.62')
  .to('#s4-cta', {opacity:1, scale:1, duration:0.45}, 'toF4+=0.78')
  .to({}, {duration:HOLD});
</script>
