<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ad.size" content="width=160,height=600">
<style>
@font-face{font-family:'FHACond';src:url('/marly-work/ghia/media/fonts/FHACondFrenchNC.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'NHD';src:url('/marly-work/ghia/media/fonts/NeueHaasDisplayRoman.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{width:160px;height:600px;overflow:hidden;background:#000;}
a{display:block;width:160px;height:600px;text-decoration:none;cursor:pointer;}
.ad{position:relative;width:160px;height:600px;overflow:hidden;background:#000;}
.glow{position:absolute;left:-165px;top:195px;width:485px;height:381px;background:radial-gradient(ellipse at center,rgba(255,255,255,0.05) 0%,transparent 70%);transform:rotate(-15.52deg);transform-origin:center;pointer-events:none;z-index:0;opacity:0;animation:fadeIn 1.2s cubic-bezier(.22,.61,.36,1) 0s forwards;}
.logo{position:absolute;left:50%;transform:translateX(-50%);top:48px;width:77px;height:32px;z-index:2;opacity:0;animation:fadeIn 0.7s cubic-bezier(.22,.61,.36,1) 0.1s forwards;}
.logo img{width:77px;height:32px;object-fit:contain;filter:brightness(0) invert(1);display:block;}
.headline-top{position:absolute;left:50%;transform:translateX(-50%);top:128px;width:133px;text-align:center;font-family:'FHACond',serif;font-size:24px;font-weight:400;color:#fff;line-height:1.1;z-index:2;clip-path:inset(0 100% 0 0);animation:clipLTR 0.8s cubic-bezier(.22,.61,.36,1) 0.4s forwards;}
.product{position:absolute;left:-9px;top:181px;width:176px;height:160px;z-index:1;opacity:0;transform:scale(0.96);animation:settleIn 0.9s cubic-bezier(.22,.61,.36,1) 0.6s forwards;}
.product img{width:176px;height:160px;object-fit:cover;display:block;}
.headline-bottom{position:absolute;left:50%;transform:translateX(-50%);top:441px;width:133px;text-align:center;font-family:'FHACond',serif;font-size:20px;font-weight:400;color:#fff;line-height:1.1;z-index:2;clip-path:inset(0 100% 0 0);animation:clipLTR 0.8s cubic-bezier(.22,.61,.36,1) 1.0s forwards;}
.subhead{position:absolute;left:50%;transform:translateX(-50%);top:474px;width:133px;text-align:center;font-family:'NHD',sans-serif;font-size:11px;font-weight:400;color:#fff;letter-spacing:0.02em;line-height:1.3;z-index:2;opacity:0;animation:fadeIn 0.5s cubic-bezier(.22,.61,.36,1) 1.4s forwards;}
.cta{position:absolute;left:26px;top:520px;width:106px;height:30px;background:#6B2039;border-radius:2px;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transform:scale(0.96);animation:ctaIn 0.6s cubic-bezier(.22,.61,.36,1) 1.5s forwards;}
.cta span{font-family:'NHD',sans-serif;font-size:12px;font-weight:400;color:#fff;white-space:nowrap;}
@keyframes fadeIn{to{opacity:1;}}
@keyframes clipLTR{to{clip-path:inset(0 0 0 0);}}
@keyframes settleIn{to{opacity:1;transform:scale(1);}}
@keyframes ctaIn{to{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
<a href="%%CLICK_URL_ESC%%" target="_blank" rel="noopener">
<div class="ad">
  <div class="glow"></div>
  <div class="logo"><img src="/marly-work/ghia/media/logo-ghia.svg" alt="Ghia" width="77" height="32"></div>
  <div class="headline-top">All of the spirit.</div>
  <div class="product"><img src="/marly-work/ghia/media/img/product-focus1.png" alt="" width="176" height="160"></div>
  <div class="headline-bottom">None of the booze.</div>
  <div class="subhead">5 BOLD FLAVORS.<br>0% ALCOHOL</div>
  <div class="cta"><span>Shop Le Spritz</span></div>
</div>
</a>
</body>
</html>
