<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ad.size" content="width=300,height=250">
<style>
@font-face{font-family:'FHACond';src:url('/marly-work/ghia/media/fonts/FHACondFrenchNC.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'NHD';src:url('/marly-work/ghia/media/fonts/NeueHaasDisplayRoman.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{width:300px;height:250px;overflow:hidden;background:#000;}
a{display:block;width:300px;height:250px;text-decoration:none;cursor:pointer;}
.ad{position:relative;width:300px;height:250px;overflow:hidden;background:#000;}
.bg-product{position:absolute;left:32px;top:18px;width:237px;height:215px;opacity:0;animation:ghostIn 0.9s cubic-bezier(.22,.61,.36,1) 0s forwards;}
.bg-product img{width:237px;height:215px;object-fit:cover;display:block;}
.logo{position:absolute;left:50%;transform:translateX(-50%);top:28px;width:77px;height:32px;opacity:0;animation:fadeIn 0.7s cubic-bezier(.22,.61,.36,1) 0.1s forwards;}
.logo img{width:77px;height:32px;object-fit:contain;filter:brightness(0) invert(1);display:block;}
.content{position:absolute;left:50%;transform:translateX(-50%);top:96px;width:179px;text-align:center;}
.headline{font-family:'FHACond',serif;font-size:24px;font-weight:400;color:#fff;line-height:1.1;clip-path:inset(0 100% 0 0);animation:clipLTR 0.8s cubic-bezier(.22,.61,.36,1) 0.5s forwards;}
.subhead{font-family:'NHD',sans-serif;font-size:11px;font-weight:400;color:#fff;margin-top:8px;letter-spacing:0.02em;opacity:0;animation:fadeIn 0.5s cubic-bezier(.22,.61,.36,1) 1.0s forwards;}
.cta{position:absolute;left:97px;top:192px;width:106px;height:30px;background:#6B2039;border-radius:2px;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0.96);animation:ctaIn 0.6s cubic-bezier(.22,.61,.36,1) 1.2s forwards;}
.cta span{font-family:'NHD',sans-serif;font-size:12px;font-weight:400;color:#fff;white-space:nowrap;}
@keyframes fadeIn{to{opacity:1;}}
@keyframes ghostIn{to{opacity:0.25;}}
@keyframes clipLTR{to{clip-path:inset(0 0 0 0);}}
@keyframes ctaIn{to{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
<a href="%%CLICK_URL_ESC%%" target="_blank" rel="noopener">
<div class="ad">
  <div class="bg-product"><img src="/marly-work/ghia/media/img/product-focus1.png" alt="" width="237" height="215"></div>
  <div class="logo"><img src="/marly-work/ghia/media/logo-ghia.svg" alt="Ghia" width="77" height="32"></div>
  <div class="content">
    <div class="headline">All of the spirit.<br>None of the booze.</div>
    <div class="subhead">5 BOLD FLAVORS.&nbsp;&nbsp;0% ALCOHOL</div>
  </div>
  <div class="cta"><span>Shop Le Spritz</span></div>
</div>
</a>
</body>
</html>
