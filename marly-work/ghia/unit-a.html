<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ad.size" content="width=728,height=90">
<style>
@font-face{font-family:'FHACond';src:url('/marly-work/ghia/media/fonts/FHACondFrenchNC.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'NHD';src:url('/marly-work/ghia/media/fonts/NeueHaasDisplayRoman.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{width:728px;height:90px;overflow:hidden;background:#000;}
a{display:block;width:728px;height:90px;text-decoration:none;cursor:pointer;}
.ad{position:relative;width:728px;height:90px;overflow:hidden;background:#000;}
.logo{position:absolute;left:30px;top:50%;transform:translateY(-50%);width:77px;height:32px;opacity:0;animation:fadeIn 0.7s cubic-bezier(.22,.61,.36,1) 0s forwards;}
.logo img{width:77px;height:32px;object-fit:contain;filter:brightness(0) invert(1);display:block;}
.product{position:absolute;left:138px;bottom:3px;width:93px;height:84px;opacity:0;transform:scale(0.96);animation:settleIn 0.7s cubic-bezier(.22,.61,.36,1) 0.2s forwards;}
.product img{width:93px;height:84px;object-fit:cover;display:block;}
.content{position:absolute;left:262px;top:50%;transform:translateY(-50%);width:297px;}
.headline{font-family:'FHACond',serif;font-size:24px;font-weight:400;color:#fff;line-height:1;white-space:nowrap;clip-path:inset(0 100% 0 0);animation:clipLTR 0.8s cubic-bezier(.22,.61,.36,1) 0.4s forwards;}
.subhead{font-family:'NHD',sans-serif;font-size:11px;font-weight:400;color:#fff;margin-top:8px;letter-spacing:0.02em;white-space:nowrap;opacity:0;animation:fadeIn 0.5s cubic-bezier(.22,.61,.36,1) 0.9s forwards;}
.cta{position:absolute;left:599px;top:50%;transform:translateY(-50%) scale(0.96);width:106px;height:30px;background:#6B2039;border-radius:2px;display:flex;align-items:center;justify-content:center;opacity:0;animation:ctaInMid 0.6s cubic-bezier(.22,.61,.36,1) 1.1s forwards;}
.cta span{font-family:'NHD',sans-serif;font-size:12px;font-weight:400;color:#fff;white-space:nowrap;}
@keyframes fadeIn{to{opacity:1;}}
@keyframes clipLTR{to{clip-path:inset(0 0 0 0);}}
@keyframes settleIn{to{opacity:1;transform:scale(1);}}
@keyframes ctaInMid{to{opacity:1;transform:translateY(-50%) scale(1);}}
</style>
</head>
<body>
<a href="%%CLICK_URL_ESC%%" target="_blank" rel="noopener">
<div class="ad">
  <div class="logo"><img src="/marly-work/ghia/media/logo-ghia.svg" alt="Ghia" width="77" height="32"></div>
  <div class="product"><img src="/marly-work/ghia/media/img/product-focus1.png" alt="" width="93" height="84"></div>
  <div class="content">
    <div class="headline">All of the spirit. None of the booze.</div>
    <div class="subhead">5 BOLD FLAVORS.&nbsp;&nbsp;0% ALCOHOL</div>
  </div>
  <div class="cta"><span>Shop Le Spritz</span></div>
</div>
</a>
</body>
</html>
