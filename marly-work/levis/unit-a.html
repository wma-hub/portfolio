<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="ad.size" content="width=728,height=90">
  <title>Levi's Pride 2026 — Meet You Here — 728×90</title>
  <style>
    @font-face{font-family:'Anton';src:url('/marly-work/levis/media/fonts/Anton-Regular.woff2')format('woff2');font-weight:400;font-display:swap;}
    @font-face{font-family:'Inter';src:url('/marly-work/levis/media/fonts/Inter-SemiBold.woff2')format('woff2');font-weight:600;font-display:swap;}
    @font-face{font-family:'Inter';src:url('/marly-work/levis/media/fonts/Inter-Bold.woff2')format('woff2');font-weight:700;font-display:swap;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{width:728px;height:90px;overflow:hidden;cursor:pointer;}
    .ad{position:relative;width:728px;height:90px;background:#232323;overflow:hidden;border:1px solid #333;}
    .logo{position:absolute;left:252px;top:calc(50% + 1.5px);transform:translateY(-50%);width:71px;height:29px;z-index:10;object-fit:contain;}
    .headline{position:absolute;left:349px;top:30px;font-family:'Anton',sans-serif;font-weight:400;font-size:22px;color:#fff;white-space:nowrap;letter-spacing:-0.02em;z-index:5;}
    .cta-wrap{position:absolute;left:548px;top:31px;z-index:5;}
    .cta-btn{background:#c8102e;color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:13px;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;}
  </style>
</head>
<body>
  <div class="ad">
    <!-- img-zone: flat Figma structure, vertically centered -->
    <div id="img-zone" style="position:absolute;transform:translateY(-50%);height:190px;left:0;top:50%;width:226px;z-index:1;">
      <img src="/marly-work/levis/media/images/pride-2.webp" alt="" style="position:absolute;inset:0;max-width:none;object-fit:cover;pointer-events:none;width:100%;height:100%;">
    </div>
    <img class="logo" id="logo" src="/marly-work/levis/media/images/logo.png" alt="Levi's">
    <div class="headline" id="headline">Meet you here.</div>
    <div class="cta-wrap" id="cta-wrap">
      <button class="cta-btn">Shop the Collection</button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    window.clickTag="https://www.levi.com/US/en_US/lgbt-pride-collection/c/levi_clothing_pride_us";
    document.addEventListener('click',function(){window.open(window.clickTag,'_blank');});
    gsap.set(['#img-zone','#logo','#headline','#cta-wrap'],{autoAlpha:0});
    const tl=gsap.timeline();
    tl.to('#img-zone',{autoAlpha:1,duration:0.5})
      .to('#logo',{autoAlpha:1,duration:0.4})
      .fromTo('#headline',{autoAlpha:0,y:8},{autoAlpha:1,y:0,duration:0.5,ease:'power2.out'})
      .to('#cta-wrap',{autoAlpha:1,duration:0.4},'+=0.1');
  </script>
</body>
</html>
