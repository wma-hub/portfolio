<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magic Spoon — Summer Sampler Drop — Set 1 — 160×600</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{margin:0}
a{color:inherit;text-decoration:none}

.ad{
  position:relative;
  width:160px;height:600px;
  overflow:hidden;
  background:#c0f0fd;
  cursor:pointer;display:block;
}

/* Decorative circles */
.c{position:absolute;border-radius:50%;pointer-events:none;z-index:1;}

/* Logo wrapper */
.logo-wrap{
  position:absolute;
  left:15px;top:35px;
  width:130px;height:58px;
  z-index:5;
  opacity:0;
  animation:fadeIn 0.5s ease 0.2s forwards;
}
.logo-wrap svg{display:block;overflow:visible;}

/* Headline */
.headline{
  position:absolute;
  left:0;right:0;top:122px;
  text-align:center;
  font-family:'Poppins',Arial,sans-serif;
  font-size:18px;font-weight:700;
  line-height:20px;
  color:#ff6b6b;
  z-index:3;
  opacity:0;
  animation:slideUp 0.5s ease 0.35s forwards;
}

/* Subhead */
.subhead{
  position:absolute;
  left:13px;top:172px;
  width:130px;
  text-align:center;
  font-family:'Poppins',Arial,sans-serif;
  font-size:12px;font-weight:600;
  line-height:1.4;
  color:#ff6b6b;
  z-index:3;
  opacity:0;
  animation:slideUp 0.4s ease 0.5s forwards;
}
.subhead-inner{opacity:0.85;}

/* Product image — large, bleeds both sides */
.product-img{
  position:absolute;
  left:-144px;top:111px;
  width:462px;height:462px;
  z-index:2;
  opacity:0;
  animation:fadeIn 0.6s ease 0.25s forwards;
}
.product-img img{
  width:462px;height:462px;
  object-fit:cover;display:block;
}

/* Body */
.body-copy{
  position:absolute;
  left:0;right:0;top:528px;
  text-align:center;
  font-family:'Poppins',Arial,sans-serif;
  font-size:11px;font-weight:500;
  line-height:1.5;
  color:#ff6b6b;
  z-index:3;
  opacity:0;
  animation:slideUp 0.4s ease 0.65s forwards;
}
.body-copy-inner{opacity:0.85;}

/* CTA — moved up from bottom */
.cta-btn{
  position:absolute;
  left:50%;bottom:95px;
  transform:translateX(-50%);
  width:97px;height:40px;
  display:flex;align-items:center;justify-content:center;
  background:#fff;
  border-radius:100px;
  font-family:'Poppins',Arial,sans-serif;
  font-size:16px;font-weight:700;
  color:#1b1464;
  white-space:nowrap;
  z-index:4;
  opacity:0;
  animation:fadeIn 0.4s ease 0.8s forwards;
}

/* Border */
.boundary{position:absolute;inset:0;border:1px solid rgba(255,255,255,0.18);pointer-events:none;z-index:6;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;}
}
</style>
</head>
<body>
<a class="ad" href="https://magicspoon.com/summer" target="_blank">

  <!-- Decorative circles -->
  <div class="c" style="width:80px;height:80px;left:106px;top:-22px;background:#FFD700;"></div>
  <div class="c" style="width:44px;height:44px;left:-22px;top:-20px;background:#1B1464;"></div>
  <div class="c" style="width:40px;height:40px;left:130px;top:216px;background:#4CAF50;"></div>
  <div class="c" style="width:32px;height:32px;left:-10px;top:144px;background:#4A90D9;"></div>

  <!-- Logo (Magic Spoon wordmark, navy) -->
  <div class="logo-wrap">
    <img src="/marly-work/magic-spoon/media/logo-magic-spoon.svg" width="130" height="58" alt="Magic Spoon">
  </div>

  <!-- Headline -->
  <div class="headline">CEREAL THAT<br>DOESN'T SUCK</div>

  <!-- Subhead -->
  <div class="subhead"><span class="subhead-inner">Try all 4<br>summer flavors.</span></div>

  <!-- Product image -->
  <div class="product-img">
    <img src="/marly-work/magic-spoon/media/product-focused-coral.avif" width="462" height="462" alt="">
  </div>

  <!-- Body -->
  <div class="body-copy"><span class="body-copy-inner">High protein.<br>Zero sugar.<br>Stupid delicious.</span></div>

  <!-- CTA -->
  <div class="cta-btn">TRY IT</div>

  <!-- Border -->
  <div class="boundary"></div>

</a>
<script>
(function(){
  if(typeof gsap==='undefined') return;
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  var circles=Array.from(document.querySelectorAll('.c'));
  var sorted=circles.slice().sort(function(a,b){return parseFloat(a.style.width)-parseFloat(b.style.width);});
  gsap.set(sorted,{scale:0,opacity:0,transformOrigin:'center center'});
  gsap.to(sorted,{
    scale:1,opacity:1,duration:0.5,ease:'back.out(1.7)',
    stagger:0.1,delay:0.2,
    onComplete:function(){
      sorted.forEach(function(el,i){
        var sz=parseFloat(el.style.width);
        var dy=sz<25?5:sz<50?4:3;
        var dx=sz<25?2:1;
        var dur=2.5+Math.random()*1.5;
        gsap.to(el,{y:dy,duration:dur,ease:'sine.inOut',repeat:-1,yoyo:true,delay:i*0.15});
        gsap.to(el,{x:dx,duration:dur*0.7,ease:'sine.inOut',repeat:-1,yoyo:true,delay:i*0.1});
      });
    }
  });
})();
</script>
</body>
</html>
