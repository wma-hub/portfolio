<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Jost:wght@300;400&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:160px;height:600px;overflow:hidden;background:#F9F9F9;font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased}

.ad{position:relative;width:160px;height:600px;overflow:hidden;background:#F9F9F9;}

@keyframes gFadeIn{from{opacity:0}to{opacity:1}}
@keyframes gRiseIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmerPulse{0%,100%{opacity:0.18}50%{opacity:0.42}}
@keyframes ctaSheen{0%{transform:translateX(0)}100%{transform:translateX(200%)}}

/* Accent orbs — rotations per Figma */
.accent-orb{position:absolute;border-radius:50%;pointer-events:none;z-index:0;opacity:0;animation:gFadeIn 1.0s ease-out 0.2s both;}
.accent-orb-1{width:247px;height:227px;left:-31px;top:23px;background:radial-gradient(ellipse,rgba(207,176,141,0.18) 0%,transparent 68%);transform:rotate(102.46deg);}
.accent-orb-2{width:273px;height:343px;left:-54px;bottom:-91px;background:radial-gradient(ellipse,rgba(207,176,141,0.15) 0%,transparent 68%);transform:rotate(-77.54deg);}

/* Gold header band */
.header-band{
  position:absolute;top:0;left:0;width:160px;height:76px;
  background:#CFB08D;z-index:5;
}

/* Logo — white on gold band */
.logo-zone{
  position:absolute;left:30px;top:30px;width:100px;height:19px;z-index:6;
  opacity:0;animation:gFadeIn 0.9s ease-out 0.4s both;
}

/* Overline */
.overline{
  position:absolute;top:97px;left:0;width:160px;
  text-align:center;
  font-family:'Playfair Display',Georgia,serif;font-style:normal;font-size:14px;font-weight:400;
  letter-spacing:0.28px;
  color:#6f6f6f;
  opacity:0;animation:gFadeIn 0.7s ease-out 0.6s both;
  z-index:5;
}

/* Shimmer behind product */
.shimmer-glow{
  position:absolute;left:-20px;top:155px;width:200px;height:200px;
  background:radial-gradient(ellipse,rgba(207,176,141,0.22) 0%,rgba(207,176,141,0.06) 50%,transparent 72%);
  border-radius:50%;pointer-events:none;z-index:3;
  opacity:0;
  animation:gFadeIn 0.9s ease-out 2.2s both,shimmerPulse 3s ease-in-out 3.8s 3 forwards;
}

/* Product image */
.product-wrap{
  position:absolute;top:136px;left:0;width:160px;height:218px;
  overflow:hidden;z-index:4;
  opacity:0;animation:gFadeIn 0.9s ease-out 1.0s both;
}
.product-wrap img{width:100%;height:100%;object-fit:contain;object-position:center center;}

/* Headline — 3 lines centered */
.headline{
  position:absolute;top:354px;left:0;width:160px;
  text-align:center;
  font-family:'Jost',sans-serif;font-style:normal;font-size:24px;font-weight:300;
  line-height:1.18;color:#6f6f6f;
  opacity:0;animation:gRiseIn 0.85s cubic-bezier(0.25,0.46,0.45,0.94) 1.8s both;
  z-index:5;
}

/* Supporting copy */
.supporting{
  position:absolute;top:467px;left:0;width:160px;
  text-align:center;
  font-family:'Jost',sans-serif;font-size:12px;font-weight:400;
  letter-spacing:0.03em;line-height:1.25;
  color:#6f6f6f;
  opacity:0;animation:gFadeIn 0.7s ease-out 2.4s both;
  z-index:5;
}

/* Gold CTA bar */
.cta-bar{
  position:absolute;left:0;top:556px;width:160px;height:44px;
  background:#CFB08D;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  z-index:7;
  opacity:0;animation:gRiseIn 0.8s cubic-bezier(0.25,0.46,0.45,0.94) 3.0s both;
}
.cta-bar::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(110deg,transparent 38%,rgba(255,255,255,0.22) 50%,transparent 62%);
  animation:ctaSheen 2.4s ease-in-out 5.2s 2;
  pointer-events:none;
}
.cta{
  font-family:'Playfair Display',Georgia,serif;font-size:12px;font-weight:500;
  color:#FFFFFF;letter-spacing:0.04em;
  text-decoration:underline;text-underline-offset:2px;
  cursor:pointer;white-space:nowrap;
}

.click-overlay{position:absolute;inset:0;z-index:10;display:block;}
@media (prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important}}
</style>
